<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>タッチテスト</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%;
  overflow: hidden;
  background: #f5f0eb;
  font-family: sans-serif;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  gap: 12px;
}
#log {
  width: 100%;
  max-width: 400px;
  background: white;
  border-radius: 8px;
  padding: 10px;
  font-size: 0.8rem;
  color: #555;
  height: 80px;
  overflow-y: auto;
}
canvas {
  background: white;
  border-radius: 12px;
  border: 3px solid #e8b4b8;
  display: block;
  /* touch-action なし — まず素のままで試す */
}
button {
  padding: 10px 28px;
  border: none;
  border-radius: 20px;
  background: #e8b4b8;
  color: white;
  font-size: 1rem;
}
</style>
</head>
<body>
<div id="log">イベントログ：</div>
<canvas id="c"></canvas>
<button onclick="clearCanvas()">消す</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const log = document.getElementById('log');

canvas.width = Math.min(window.innerWidth - 40, 380);
canvas.height = 280;
ctx.fillStyle = 'white';
ctx.fillRect(0, 0, canvas.width, canvas.height);

let drawing = false, lastX = 0, lastY = 0, dotCount = 0;

function addLog(msg) {
  log.innerHTML += '<br>' + msg;
  log.scrollTop = log.scrollHeight;
}

function pos(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * (canvas.width / r.width),
    y: (e.clientY - r.top) * (canvas.height / r.height)
  };
}

function dot(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 12, 0, Math.PI*2);
  ctx.fillStyle = '#e8b4b8';
  ctx.fill();
}

function line(x, y) {
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = '#e8b4b8';
  ctx.lineWidth = 24;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// --- Touch Events (古い方式) ---
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  drawing = true;
  const p = pos(e.touches[0]);
  lastX = p.x; lastY = p.y;
  dot(p.x, p.y);
  dotCount++;
  addLog('touchstart (' + Math.round(p.x) + ',' + Math.round(p.y) + ')');
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!drawing) return;
  const p = pos(e.touches[0]);
  line(p.x, p.y);
  lastX = p.x; lastY = p.y;
  addLog('touchmove → 描画中');
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  drawing = false;
  addLog('touchend');
}, { passive: false });

function clearCanvas() {
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  log.innerHTML = 'クリア！また描いてみて';
  dotCount = 0;
}

addLog('準備OK — 指で描いてみて');
</script>
</body>
</html>
