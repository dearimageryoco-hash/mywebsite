<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>キャンバステスト2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f0eb; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; }
  h1 { margin-bottom: 8px; font-size: 1rem; color: #555; }
  #status { margin-bottom: 12px; font-size: 0.95rem; color: #e87; min-height: 1.5em; text-align: center; }
  canvas {
    background: white;
    border-radius: 12px;
    border: 3px solid #e8b4b8;
    display: block;
    touch-action: none;
    -ms-touch-action: none;
  }
  button {
    margin-top: 16px;
    padding: 10px 28px;
    border: none;
    border-radius: 20px;
    background: #e8b4b8;
    color: white;
    font-size: 1rem;
    cursor: pointer;
  }
</style>
</head>
<body>
<h1>指で描いてみてください 🌸</h1>
<div id="status">準備OK！指で触れてみて</div>
<canvas id="c"></canvas>
<button id="clearBtn">消す</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

canvas.width = Math.min(window.innerWidth - 40, 380);
canvas.height = 300;
ctx.fillStyle = 'white';
ctx.fillRect(0, 0, canvas.width, canvas.height);

let drawing = false;
let lastX = 0, lastY = 0;

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

canvas.addEventListener('pointerdown', function(e) {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  drawing = true;
  const p = getCanvasPos(e);
  lastX = p.x; lastY = p.y;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#e8b4b8';
  ctx.fill();
  status.textContent = '✅ 描けています！';
  status.style.color = '#4a9';
}, { passive: false });

canvas.addEventListener('pointermove', function(e) {
  if (!drawing) return;
  e.preventDefault();
  const p = getCanvasPos(e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(p.x, p.y);
  ctx.strokeStyle = '#e8b4b8';
  ctx.lineWidth = 20;
  ctx.lineCap = 'round';
  ctx.stroke();
  lastX = p.x; lastY = p.y;
}, { passive: false });

canvas.addEventListener('pointerup', () => { drawing = false; });
canvas.addEventListener('pointercancel', () => { drawing = false; });

document.getElementById('clearBtn').addEventListener('click', () => {
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  status.textContent = '準備OK！指で触れてみて';
  status.style.color = '#e87';
});
</script>
</body>
</html>
